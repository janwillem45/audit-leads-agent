name: Daily audit-leads scan

on:
  schedule:
    # GitHub cron is UTC. We register two times to cover both DST regimes:
    #   - 21:00 UTC = 23:00 CEST (summer) / 22:00 CET (winter)
    #   - 22:00 UTC = 00:00 CEST (summer) / 23:00 CET (winter)
    # Both fire every day; state/seen.json dedup makes sure leads are
    # sent only once per day. We don't gate on local hour because GitHub
    # frequently delays scheduled runs by 30-90 minutes.
    - cron: '0 21 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without sending email'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: audit-leads-daily
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scan
        env:
          OMNIFOCUS_MAILDROP: ${{ secrets.OMNIFOCUS_MAILDROP }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              python run.py --dry-run --force --debug
            else
              python run.py --force
            fi
          else
            python run.py
          fi

      - name: Commit updated state
        if: success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -n "$(git status --porcelain state/seen.json)" ]; then
            git add state/seen.json
            git commit -m "chore: update seen state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No state changes to commit."
          fi
